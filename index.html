<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>স্মার্ট জমি ক্যালকুলেটর</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

.box{
    max-width:450px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#0d6efd;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef8f0;
    border-left:5px solid green;
}

</style>
</head>

<body>

<div class="box">

<h2>স্মার্ট জমি ক্যালকুলেটর</h2>

<label>অংশ অনুযায়ী জমির পরিমান (A)</label>
<input type="number" id="a">

<label>দাগে মোট জমির পরিমান (B)</label>
<input type="number" id="b">

<label>দাগের মধ্যে অত্র খতিয়ানের অংশ (C)</label>
<input type="number" id="c" step="any">

<button onclick="calculate()">হিসাব করুন</button>

<div class="result" id="result">
ফলাফল এখানে দেখাবে
</div>

</div>

<script>

function calculate(){

    let a = parseFloat(document.getElementById('a').value);
    let b = parseFloat(document.getElementById('b').value);
    let c = parseFloat(document.getElementById('c').value);

    let filled = 0;

    if(!isNaN(a)) filled++;
    if(!isNaN(b)) filled++;
    if(!isNaN(c)) filled++;

    if(filled !== 2){
        document.getElementById('result').innerHTML =
        "শুধু ২টি ঘর পূরণ করুন";
        return;
    }

    // C বের করবে
    if(!isNaN(a) && !isNaN(b) && isNaN(c)){

        c = a / b;

        document.getElementById('result').innerHTML =
        "দাগের মধ্যে অত্র খতিয়ানের অংশ = " + c.toFixed(6);
    }

    // A বের করবে
    else if(isNaN(a) && !isNaN(b) && !isNaN(c)){

        a = c * b;

        document.getElementById('result').innerHTML =
        "অংশ অনুযায়ী জমির পরিমান = " + a.toFixed(6);
    }

    // B বের করবে
    else if(!isNaN(a) && isNaN(b) && !isNaN(c)){

        b = a / c;

        document.getElementById('result').innerHTML =
        "দাগে মোট জমির পরিমান = " + b.toFixed(6);
    }

}

</script>

</body>
</html>
