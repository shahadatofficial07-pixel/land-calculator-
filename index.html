<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>স্মার্ট জমি ক্যালকুলেটর</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Hind Siliguri', sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.box{
    max-width:450px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:8px;
}

.sub-text{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-bottom:18px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.calculate-btn{
    background:#0d6efd;
    color:white;
}

.calculate-btn:hover{
    background:#0b5ed7;
}

.reset-btn{
    background:#dc3545;
    color:white;
}

.reset-btn:hover{
    background:#bb2d3b;
}

#copyBtn{
    width:100%;
    margin-top:12px;
    background:#198754;
    color:white;
}

#copyBtn:hover{
    background:#157347;
}

.result{
    margin-top:25px;
    background:#eef8f0;
    border-left:5px solid green;
    padding:15px;
    border-radius:8px;
    font-size:18px;
    line-height:1.8;
    word-break:break-word;
}

.footer{
    text-align:center;
    margin-top:18px;
    font-size:14px;
    color:#777;
}

/* Notification */

.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#198754;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    font-size:15px;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
    z-index:999;
}

.toast.show{
    opacity:1;
    visibility:visible;
}

</style>
</head>

<body>

<div class="box">

<h2>স্মার্ট জমি ক্যালকুলেটর</h2>

<p class="sub-text">
যে কোন ২ টি ভ্যালু দিন
</p>

<label>অংশ অনুযায়ী জমির পরিমান (A)</label>
<input type="number" id="a" placeholder="যেমন: 25">

<label>দাগে মোট জমির পরিমান (B)</label>
<input type="number" id="b" placeholder="যেমন: 100">

<label>দাগের মধ্যে অত্র খতিয়ানের অংশ (C)</label>
<input type="number" id="c" step="any" placeholder="যেমন: 0.25">

<div class="buttons">

<button class="calculate-btn" onclick="calculate()">
হিসাব করুন
</button>

<button class="reset-btn" onclick="resetForm()">
রিসেট
</button>

</div>

<div class="result" id="result">
ফলাফল এখানে দেখাবে
</div>

<button onclick="copyResult()" id="copyBtn">
📋 ফলাফল কপি করুন
</button>

<div class="footer">
Developed for Land Share Calculation
</div>

</div>

<!-- Notification -->

<div class="toast" id="toast">
✅ কপি হয়েছে
</div>

<script>

window.lastResult = "";

function calculate(){

    let a = parseFloat(document.getElementById('a').value);
    let b = parseFloat(document.getElementById('b').value);
    let c = parseFloat(document.getElementById('c').value);

    let filled = 0;

    if(!isNaN(a)) filled++;
    if(!isNaN(b)) filled++;
    if(!isNaN(c)) filled++;

    if(filled !== 2){

        document.getElementById('result').innerHTML =
        "⚠️ শুধুমাত্র ২টি ঘর পূরণ করুন";

        return;
    }

    // C বের করবে

    if(!isNaN(a) && !isNaN(b) && isNaN(c)){

        if(b == 0){

            document.getElementById('result').innerHTML =
            "⚠️ মোট জমির পরিমান ০ হতে পারবে না";

            return;
        }

        c = a / b;

        window.lastResult = c.toFixed(6);

        document.getElementById('result').innerHTML =
        `
        <strong>দাগের মধ্যে অত্র খতিয়ানের অংশ:</strong><br>
        ${window.lastResult}
        `;
    }

    // A বের করবে

    else if(isNaN(a) && !isNaN(b) && !isNaN(c)){

        a = c * b;

        window.lastResult = a.toFixed(6);

        document.getElementById('result').innerHTML =
        `
        <strong>অংশ অনুযায়ী জমির পরিমান:</strong><br>
        ${window.lastResult}
        `;
    }

    // B বের করবে

    else if(!isNaN(a) && isNaN(b) && !isNaN(c)){

        if(c == 0){

            document.getElementById('result').innerHTML =
            "⚠️ অংশের মান ০ হতে পারবে না";

            return;
        }

        b = a / c;

        window.lastResult = b.toFixed(6);

        document.getElementById('result').innerHTML =
        `
        <strong>দাগে মোট জমির পরিমান:</strong><br>
        ${window.lastResult}
        `;
    }

}

function resetForm(){

    document.getElementById('a').value = "";
    document.getElementById('b').value = "";
    document.getElementById('c').value = "";

    document.getElementById('result').innerHTML =
    "ফলাফল এখানে দেখাবে";

    window.lastResult = "";
}

function copyResult(){

    navigator.clipboard.writeText(window.lastResult);

    let toast = document.getElementById('toast');

    toast.classList.add('show');

    setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}

</script>

</body>
</html>
