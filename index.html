<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>জমির অংশ ক্যালকুলেটর</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      margin:0;
      padding:0;
    }

    .container{
      max-width:500px;
      margin:50px auto;
      background:#fff;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      color:#0b5ed7;
      margin-bottom:25px;
    }

    label{
      font-weight:bold;
      display:block;
      margin-top:15px;
      margin-bottom:5px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:12px;
      background:#0b5ed7;
      color:white;
      border:none;
      border-radius:5px;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#084298;
    }

    .result{
      margin-top:25px;
      padding:15px;
      background:#e9f7ef;
      border-left:5px solid green;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>জমির অংশ ক্যালকুলেটর</h2>

    <label>অংশ অনুযায়ী জমির পরিমান</label>
    <input type="number" id="partLand" placeholder="মান লিখুন">

    <label>দাগে মোট জমির পরিমান</label>
    <input type="number" id="totalLand" placeholder="মান লিখুন">

    <button onclick="calculate()">হিসাব করুন</button>

    <div class="result" id="result">
      ফলাফল এখানে দেখাবে
    </div>
  </div>

  <script>
    function calculate() {

      let partLand = parseFloat(document.getElementById("partLand").value);
      let totalLand = parseFloat(document.getElementById("totalLand").value);

      if(isNaN(partLand) || isNaN(totalLand) || totalLand === 0){
        document.getElementById("result").innerHTML =
          "সঠিক সংখ্যা দিন এবং মোট জমির পরিমান ০ হতে পারবে না।";
        return;
      }

      let result = partLand / totalLand;

      document.getElementById("result").innerHTML =
        "দাগের মধ্যে অত্র খতিয়ানের অংশ = " + result.toFixed(6);
    }
  </script>

</body>
</html>
